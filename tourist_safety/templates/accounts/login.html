{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2> Login</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Phone Number" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

{% endblock %}
